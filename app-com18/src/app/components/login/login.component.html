<section class="vh-100" style="background-color: #f4f6f9; font-family: 'Poppins', sans-serif;">
    <div class="container py-5 h-100">
        <div class="row d-flex align-items-center justify-content-center h-100">
            <!-- Left Image Section -->
            <div class="col-md-8 col-lg-7 col-xl-6">
                <div class="bg-image"></div>
            </div>

            <!-- Right Form Section -->
            <div class="col-md-7 col-lg-5 col-xl-5 offset-xl-1">
                <form class="form-container shadow-lg p-4 rounded-3">
                    <!-- Loading Spinner -->
                    <div *ngIf="isLoading" class="spinner-overlay">
                        <div class="spinner"></div>
                    </div>
                    <!-- Username Input -->
                    <div class="form-outline mb-4">
                        <input type="text" [(ngModel)]="loginObj.username" name="username"
                            class="form-control form-control-lg" placeholder="Enter your username" />
                        <label class="form-label" for="form3Example3">Username</label>
                    </div>

                    <!-- Password Input -->
                    <div class="form-outline mb-3">
                        <input type="password" [(ngModel)]="loginObj.password" name="password"
                            class="form-control form-control-lg" placeholder="Enter password" />
                        <label class="form-label" for="form3Example4">Password</label>
                    </div>

                    <!-- Login Button -->
                    <div class="text-center text-lg-start mt-4 pt-2">
                        <button (click)="onLogin()" type="button"
                            class="btn btn-primary btn-lg custom-btn">Login</button>

                        <!-- OR Divider -->
                        <div class="divider d-flex align-items-center my-4">
                            <p class="text-center fw-bold mx-3 mb-0 text-muted">OR</p>
                        </div>

                        <!-- Social Login Buttons -->
                        <div class="text-center mt-2">
                            <button (click)="onSamlLogin()" type="button" class="btn btn-dark social-btn mb-2">
                                Login with SAML2
                            </button>
                            <button (click)="onGitLogin()" type="button" class="btn btn-dark social-btn mb-2">
                                Login with Git
                            </button>
                            <button (click)="onGoogleLogin()" type="button" class="btn btn-dark social-btn mb-2">
                                Login with Google
                            </button>
                            <button (click)="onAzureLogin()" type="button" class="btn btn-dark social-btn mb-2">
                                Login with Azure
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>

<style>
    /* Spinner Overlay */
    .spinner-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(255, 255, 255, 0.8);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Spinner Style */
    .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid rgba(0, 0, 0, 0.1);
        border-top: 5px solid #007bff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }
        100% {
            transform: rotate(360deg);
        }
    }

    /* Updated Button Styles */
    .custom-btn {
        padding: 12px 40px;
        font-size: 18px;
        font-weight: 500;
        border-radius: 10px;
    }

    .social-btn {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        border-radius: 8px;
    }
</style>
