<div class="row">
    <div class="col-8">
        <div class="card">
            <div class="card-header bg-success">
                Employee List
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-12">
                        <table class="table table-bordered">
                            <thead>
                                <tr>
                                    <th>sr No</th>
                                    <th>Emp firstName</th>
                                    <th>email</th>
                                    <th>mobileNo</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let role of clientList;let srno= index">
                                    <td>{{srno+1}}</td>
                                    <td>{{role.firstName}}</td>
                                    <td>{{role.email}}</td>
                                    <td>{{role.mobileNo}}</td>
                                    <td>
                                        <button class="btn btn-primary" (click)="onedit(role)">Edit</button>
                                        <button class="btn btn-danger ms-2" (click)="onDelete(role.id)">Delete</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-4">
        <div class="card">
            <div class="card-header bg-success">
                NEWEmployee
            </div>
            <div class="card-body">
                <form #form="ngForm">
                    <div class="row">
                        <div class="col-6">
                            <label for="">FirstName</label>
                            <input type="text" #firstName="ngModel" minlength="5" required name="firstName"
                                [(ngModel)]="clientObj.firstName" class="form-control">
                            <div *ngIf="firstName.touched">
                                <div class="text-danger" *ngIf="firstName.errors?.['required']">
                                    <span>*</span>
                                </div>
                                <div class="text-danger" *ngIf="firstName.errors?.['minlength']">
                                    <span>Min 5 char required</span>
                                </div>
                            </div>
                        </div>
                        <!-- Last Name -->
                        <div class="col-6">
                            <label for="">Last Name</label>
                            <input type="text" #lastName="ngModel" name="lastName" minlength="3" required
                                [(ngModel)]="clientObj.lastName" class="form-control">
                            <div *ngIf="lastName.touched">
                                <div class="text-danger" *ngIf="lastName.errors?.['required']">
                                    <span>*</span>
                                </div>
                                <div class="text-danger" *ngIf="lastName.errors?.['minlength']">
                                    <span>Min 3 characters required</span>
                                </div>
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="col-6">
                            <label for="">Email</label>
                            <input type="email" #email="ngModel" name="email" required
                                pattern="^[a-zA-Z0-9._%+-]+@gmail\.com$" [(ngModel)]="clientObj.email"
                                class="form-control">
                            <div *ngIf="email.touched">
                                <div class="text-danger" *ngIf="email.errors?.['required']">
                                    <span>* Required</span>
                                </div>
                                <div class="text-danger" *ngIf="email.errors?.['pattern']">
                                    <span>proper email required</span>
                                </div>
                            </div>
                        </div>

                        <!-- Mobile No -->
                        <div class="col-6">
                            <label for="">Mobile No</label>
                            <input type="text" #mobileNo="ngModel" name="mobileNo" minlength="10" maxlength="10"
                                pattern="[0-9]{10}" required [(ngModel)]="clientObj.mobileNo" class="form-control">
                            <div *ngIf="mobileNo.touched">
                                <div class="text-danger" *ngIf="mobileNo.errors?.['required']">
                                    <span>*</span>
                                </div>
                                <div class="text-danger" *ngIf="mobileNo.errors?.['minlength']">
                                    <span>Must be 10 digits</span>
                                </div>
                                <div class="text-danger" *ngIf="mobileNo.errors?.['pattern']">
                                    <span>Only numbers allowed</span>
                                </div>
                            </div>
                        </div>
                        <div class="row pt-2">
                            <div class="col-6 text-center">
                                <button class="btn btn-secondary" (click)="onReset(form)">Reset</button>
                            </div>
                            <div class="col-6">
                                <button class="btn btn-success" [disabled]="!form.valid"
                                    (click)="onSaveClient()">SaveEmp</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
