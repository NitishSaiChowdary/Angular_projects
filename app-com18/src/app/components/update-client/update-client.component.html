<div class="container">
    <div class="card">
        <div class="card-header bg-primary text-white">
            Update Employee
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-6">
                    <label>First Name</label>
                    <input type="text" [(ngModel)]="clientObj.firstName" class="form-control">
                </div>
                <div class="col-6">
                    <label>Last Name</label>
                    <input type="text" [(ngModel)]="clientObj.lastName" class="form-control">
                </div>
                <div class="col-6">
                    <label>Email</label>
                    <input type="text" [(ngModel)]="clientObj.email" class="form-control">
                </div>
                <div class="col-6">
                    <label>Mobile No</label>
                    <input type="text" [(ngModel)]="clientObj.mobileNo" class="form-control">
                </div>
            </div>
            <div class="row pt-3">
                <div class="col-6 text-center">
                    <button class="btn btn-secondary" (click)="router.navigate(['/client'])">Cancel</button>
                </div>
                <div class="col-6">
                    <button class="btn btn-success" (click)="onUpdateClient()">Update</button>
                </div>
            </div>
        </div>
    </div>
</div>
